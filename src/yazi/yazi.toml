[mgr]
show_hidden = true

[flavor]
use = "catppuccin-mocha"

[preview]
max_width  = 1000
max_height = 1000
image_filter  = "lanczos3"
image_quality = 90

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*"
run   = "git"
group = "normal"

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*/"
run   = "git"
group = "normal"

[[opener.editor]]
run   = '''
  if [ -n "$NVIM" ]; then
    for f in "$@"; do nvim --server "$NVIM" --remote "$(realpath "$f")"; done
  else
    $EDITOR "$@"
  fi
'''
block = true
for   = "unix"

[[opener.preview]]
run = 'open -a Preview "$@"'
for = "macos"

[[open.prepend_rules]]
mime = "image/*"
use  = ["preview", "open"]

[[open.prepend_rules]]
mime = "application/pdf"
use  = ["preview", "open"]
