[mgr]
show_hidden = true

[flavor]
use = "catppuccin-mocha"

[[plugin.prepend_fetchers]]
id    = "git"
name  = "*"
run   = "git"
group = "normal"

[[plugin.prepend_fetchers]]
id    = "git"
name  = "*/"
run   = "git"
group = "normal"

[[plugin.prepend_previewers]]
mime = "video/*"
run  = "noop"

[[plugin.prepend_previewers]]
mime = "audio/*"
run  = "noop"

[[plugin.prepend_previewers]]
mime = "application/pdf"
run  = "noop"

[[plugin.prepend_previewers]]
mime = "application/zip"
run  = "noop"

[[plugin.prepend_previewers]]
mime = "application/gzip"
run  = "noop"

[[plugin.prepend_previewers]]
mime = "application/x-tar"
run  = "noop"

[[plugin.prepend_previewers]]
mime = "application/x-7z-compressed"
run  = "noop"

[[plugin.prepend_previewers]]
mime = "application/x-rar"
run  = "noop"

[[plugin.prepend_previewers]]
mime = "application/x-bzip2"
run  = "noop"

[[plugin.prepend_previewers]]
mime = "application/x-xz"
run  = "noop"

[[plugin.prepend_previewers]]
mime = "application/octet-stream"
run  = "noop"

[[plugin.prepend_previewers]]
mime = "application/x-executable"
run  = "noop"

[[plugin.prepend_previewers]]
mime = "application/x-mach-binary"
run  = "noop"

[[opener.editor]]
run   = '$EDITOR "$@"'
block = true
for   = "unix"

[[opener.preview]]
run = 'open -a Preview "$@"'
for = "macos"

[[open.prepend_rules]]
mime = "image/*"
use  = ["preview", "open"]

[[open.prepend_rules]]
mime = "application/pdf"
use  = ["preview", "open"]
