[[mgr.prepend_keymap]]
on   = "F"
run  = "plugin smart-filter"
desc = "Smart filter"

[[mgr.prepend_keymap]]
on = [ "1" ]
run = "plugin relative-motions 1"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "2" ]
run = "plugin relative-motions 2"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "3" ]
run = "plugin relative-motions 3"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "4" ]
run = "plugin relative-motions 4"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "5" ]
run = "plugin relative-motions 5"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "6" ]
run = "plugin relative-motions 6"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "7" ]
run = "plugin relative-motions 7"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "8" ]
run = "plugin relative-motions 8"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "9" ]
run = "plugin relative-motions 9"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = "<A-y>"
run = ["plugin copy-file-contents"]
desc = "Copy contents of file"

[[mgr.prepend_keymap]]
on = [ "m" ]
run = "plugin bookmarks save"
desc = "Save current position as a bookmark"

[[mgr.prepend_keymap]]
on = [ "'" ]
run = "plugin bookmarks jump"
desc = "Jump to a bookmark"

[[mgr.prepend_keymap]]
on = [ "b", "d" ]
run = "plugin bookmarks delete"
desc = "Delete a bookmark"

[[mgr.prepend_keymap]]
on = [ "b", "D" ]
run = "plugin bookmarks delete_all"
desc = "Delete all bookmarks"

[[mgr.prepend_keymap]]
on   = "l"
run  = ["plugin smart-enter", "plugin skip-single"]
desc = "Enter the child directory (skip single), or open the file"

[[mgr.prepend_keymap]]
on = [ "g", "h" ]
run = "cd ~"
desc = "Go to home directory"

[[mgr.prepend_keymap]]
on = [ "g", "d" ]
run = "cd ~/Downloads"
desc = "Go to Downloads"

[[mgr.prepend_keymap]]
on = [ "g", "D" ]
run = "cd ~/Desktop"
desc = "Go to Desktop"

[[mgr.prepend_keymap]]
on = [ "g", "c" ]
run = "cd ~/.config"
desc = "Go to config directory"

[[mgr.prepend_keymap]]
on = [ "g", "." ]
run = "cd ~/Programming/JimmyTranDev/dotfiles"
desc = "Go to dotfiles"

[[mgr.prepend_keymap]]
on = [ "g", "p" ]
run = "cd ~/Programming/JimmyTranDev"
desc = "Go to JimmyTranDev"

[[mgr.prepend_keymap]]
on = [ "g", "b" ]
run = "cd ~/Programming/storebrand-digital"
desc = "Go to storebrand-digital"

[[mgr.prepend_keymap]]
on = [ "g", "w" ]
run = "cd ~/Programming/wcreated"
desc = "Go to worktrees"

[[mgr.prepend_keymap]]
on = [ "c", "m" ]
run = "plugin chmod"
desc = "Change file mode"

[[mgr.prepend_keymap]]
on = "<A-d>"
run = "plugin diff"
desc = "Diff selected with hovered file"

[[mgr.prepend_keymap]]
on = "T"
run = "plugin toggle-pane max-preview"
desc = "Toggle maximize preview pane"

[[mgr.prepend_keymap]]
on = "z"
run = "cd --interactive"
desc = "Jump to directory with zoxide"

[[mgr.prepend_keymap]]
on = "<C-f>"
run = '''shell -- result=$(fd --type f --hidden --follow --exclude .git | fzf); [ -n "$result" ] && ya emit reveal "$result"'''
desc = "Fuzzy find file with fzf"
