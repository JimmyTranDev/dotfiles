matches:
  - trigger: ";pf"
    replace: "{{first_name}}"
  - trigger: ";pl"
    replace: "{{last_name}}"
  - trigger: ";pn"
    replace: "{{full_name}}"
  - trigger: ";pN"
    replace: "{{nationality}}"
  - trigger: ";pbw"
    replace: "{{birthday_world}}"
  - trigger: ";pbu"
    replace: "{{birthday_us}}"
  - trigger: ";pe"
    replace: "{{email}}"
  - trigger: ";ppp"
    replace: "{{phone}}"
  - trigger: ";ppc"
    replace: "{{phone_code}}"
  - trigger: ";ppn"
    replace: "{{phone_number}}"
  - trigger: ";pL"
    replace: "English, Norwegian, Vietnamese, Japanese"

  - trigger: ";ac"
    replace: "{{city}}"
  - trigger: ";al"
    replace: "{{address_location}}"
  - trigger: ";ap"
    replace: "{{address_code}}"
  - trigger: ";as"
    replace: "{{address_detail}}"

  - trigger: ";lg"
    replace: "{{link_github}}"
  - trigger: ";ll"
    replace: "{{link_linkedin}}"
  - trigger: ";lp"
    replace: "{{link_portfolio}}"
  - trigger: ";lm"
    replace: "{{link_massvocab}}"

  - trigger: ";jn"
    replace: "{{notice_period}}"
  - trigger: ";jsu"
    replace: "{{salary_usd}}"
  - trigger: ";jse"
    replace: "{{salary_eur}}"
  - trigger: ";jmu"
    replace: "{{monthly_salary_usd}}"
  - trigger: ";jme"
    replace: "{{monthly_salary_eur}}"

  - trigger: ";id"
    replace: "{{id_self}}"
  - trigger: ";im"
    replace: "{{id_mom}}"
  - trigger: ";if"
    replace: "{{id_dad}}"
  - trigger: ";in"
    replace: "{{id_nils}}"
  - trigger: ";b"
    replace: "Designing Data-Intensive Applications"
  - trigger: ";ja"
    replace: "Software Engineer with 6+ years delivering scalable web and mobile solutions across fintech and edtech. Full-stack expertise in TypeScript, JavaScript, Go, Python, and Dart. Founded two startups, shipping products end-to-end from architecture to deployment. Leverages AI-augmented workflows with LLM APIs, AI CLI tools, and a custom Neovim environment to maximize productivity. I think I have a lot to offer for this job!"
