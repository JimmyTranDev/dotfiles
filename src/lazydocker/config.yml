gui:
  scrollHeight: 2
  language: "auto"
  border: "rounded"
  theme:
    activeBorderColor:
      - green
      - bold
    inactiveBorderColor:
      - white
    selectedLineBgColor:
      - blue
    optionsTextColor:
      - blue
  returnImmediately: false
  wrapMainPanel: true
  sidePanelWidth: 0.333
  showBottomLine: true
  expandFocusedSidePanel: false
  screenMode: "normal"
  containerStatusHealthStyle: "long"
logs:
  timestamps: false
  since: '60m'
  tail: ''
